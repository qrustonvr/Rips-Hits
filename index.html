<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Rips &amp; Hits</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app">
    <!-- 3D canvas sits behind everything; screens overlay it -->
    <canvas id="gl"></canvas>

    <!-- Screen container (router swaps content here) -->
    <main id="screen"></main>

    <!-- Bottom tab bar -->
    <nav id="tabbar">
      <button data-route="home" aria-label="Home"><span class="ico">&#8962;</span><span>Home</span></button>
      <button data-route="collection" aria-label="Collection"><span class="ico">&#9783;</span><span>Collection</span></button>
      <button data-route="open" class="tab-open" aria-label="Open"><span class="ico">&#10022;</span><span>Open</span></button>
      <button data-route="community" aria-label="Community"><span class="ico">&#9825;</span><span>Community</span></button>
      <button data-route="profile" aria-label="Profile"><span class="ico">&#9786;</span><span>Profile</span></button>
    </nav>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
