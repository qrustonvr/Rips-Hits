<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Rips &amp; Hits</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app">
    <!-- 3D canvas sits behind everything; screens overlay it -->
    <canvas id="gl"></canvas>

    <!-- Always-visible bankroll HUD (top-right) -->
    <div id="bankroll-hud" class="ui">
      <span class="bk-icon">💰</span>
      <span id="bk-amount">$100.00</span>
    </div>

    <!-- Screen container (router swaps content here) -->
    <main id="screen"></main>

    <!-- Bottom tab bar — 3 tabs only -->
    <nav id="tabbar">
      <button data-route="home" aria-label="Packs"><span class="ico">&#8962;</span><span>Packs</span></button>
      <button data-route="open" aria-label="Open"><span class="ico">&#9733;</span><span>Open</span></button>
      <button data-route="collection" aria-label="Collection"><span class="ico">&#9783;</span><span>Collection</span></button>
    </nav>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
